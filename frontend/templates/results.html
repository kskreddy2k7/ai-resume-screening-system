<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screening Results – AI Resume Screening System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="results-page">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">AI<strong>Resume</strong></span>
      </a>
      <nav class="nav-links">
        <a href="/" class="btn btn-outline">← New Screening</a>
      </nav>
    </div>
  </header>

  <!-- ===== RESULTS DASHBOARD ===== -->
  <main class="results-main">
    <div class="results-header">
      <h1>Candidate Rankings</h1>
      <p id="resultSummary" class="results-subtitle">Loading results…</p>
    </div>

    <!-- Summary Cards -->
    <div id="summaryCards" class="summary-cards hidden">
      <div class="summary-card">
        <div class="summary-icon">👥</div>
        <div class="summary-value" id="totalCount">0</div>
        <div class="summary-label">Total Candidates</div>
      </div>
      <div class="summary-card highlight">
        <div class="summary-icon">🏆</div>
        <div class="summary-value" id="topScore">0%</div>
        <div class="summary-label">Top Score</div>
      </div>
      <div class="summary-card">
        <div class="summary-icon">📊</div>
        <div class="summary-value" id="avgScore">0%</div>
        <div class="summary-label">Average Score</div>
      </div>
      <div class="summary-card">
        <div class="summary-icon">✅</div>
        <div class="summary-value" id="excellentCount">0</div>
        <div class="summary-label">Excellent Matches</div>
      </div>
    </div>

    <!-- Search & Filter Bar -->
    <div id="filterBar" class="filter-bar hidden">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="🔍  Search candidates…"
        aria-label="Search candidates"
      />
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Excellent">Excellent</button>
        <button class="filter-btn" data-filter="Good">Good</button>
        <button class="filter-btn" data-filter="Fair">Fair</button>
        <button class="filter-btn" data-filter="Low">Low</button>
      </div>
    </div>

    <!-- Candidate Table -->
    <div id="candidatesContainer" class="candidates-container">
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Analyzing resumes with AI…</p>
      </div>
    </div>

    <!-- Skill Overview Panel -->
    <div id="skillsPanel" class="skills-panel hidden">
      <h2>Job Skills Overview</h2>
      <div id="jobSkillsList" class="skills-cloud"></div>
    </div>
  </main>

  <!-- ===== CANDIDATE DETAIL MODAL ===== -->
  <div id="detailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>
      <h2 id="modalTitle">Candidate Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>
      Built with ❤️ using Python · Flask · scikit-learn · NLP
      &nbsp;|&nbsp;
      <a href="https://github.com/kskreddy2k7/ai-resume-screening-system" target="_blank" rel="noopener">
        GitHub
      </a>
    </p>
  </footer>

  <script src="{{ url_for('static', filename='js/results.js') }}"></script>
</body>
</html>
